name: CloudTrail Security Monitoring Deploy
on:
  workflow_dispatch:
    inputs:
      action:
        description: "apply or destroy"
        required: true
        default: "apply"

env:
  TF_VAR_alarm_notification_emails: ${{ secrets.ALARM_NOTIFICATION_EMAILS }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Terraform Init
        working-directory: ./terraform-cloudtrail-demo
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"

      # ✅ Plan only for apply
      - name: Terraform Plan
        if: github.event.inputs.action == 'apply'
        working-directory: ./terraform-cloudtrail-demo
        run: terraform plan

      - name: Terraform Apply
        id: apply
        if: github.event.inputs.action == 'apply'
        working-directory: ./terraform-cloudtrail-demo
        run: terraform apply -auto-approve

      - name: Show deployment info
        if: github.event.inputs.action == 'apply'
        working-directory: ./terraform-cloudtrail-demo
        run: terraform output

      # ✅ Destroy when explicitly requested
      # Empties the CloudTrail S3 bucket first — Terraform will not
      # force-delete a non-empty bucket (same BucketNotEmpty gotcha as
      # kinesis_log's destination bucket).
      - name: Terraform Destroy (manual)
        if: github.event.inputs.action == 'destroy'
        working-directory: ./terraform-cloudtrail-demo
        run: |
          BUCKET_NAME=$(terraform output -raw cloudtrail_s3_bucket_name 2>/dev/null || echo "")
          if [ -n "$BUCKET_NAME" ]; then
            aws s3 rm "s3://$BUCKET_NAME" --recursive || true
          fi
          terraform destroy -auto-approve

      # 🔥 Destroy ONLY if apply fails (and only in apply mode)
      - name: Terraform Destroy (on failure)
        if: failure() && github.event.inputs.action == 'apply'
        working-directory: ./terraform-cloudtrail-demo
        run: |
          BUCKET_NAME=$(terraform output -raw cloudtrail_s3_bucket_name 2>/dev/null || echo "")
          if [ -n "$BUCKET_NAME" ]; then
            aws s3 rm "s3://$BUCKET_NAME" --recursive || true
          fi
          terraform destroy -auto-approve
