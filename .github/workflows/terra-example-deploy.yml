name: Terra Example VM Deploy
on:
  workflow_dispatch:
    inputs:
      action:
        description: "apply or destroy"
        required: true
        default: "apply"

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Terraform Init
        working-directory: ./Terra_example
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"

      # ✅ Plan only for apply
      - name: Terraform Plan
        if: github.event.inputs.action == 'apply'
        working-directory: ./Terra_example
        run: terraform plan

      - name: Terraform Apply
        id: apply
        if: github.event.inputs.action == 'apply'
        working-directory: ./Terra_example
        run: terraform apply -auto-approve

      - name: Show connection info
        if: github.event.inputs.action == 'apply'
        working-directory: ./Terra_example
        run: terraform output

      # ✅ Destroy when explicitly requested
      - name: Terraform Destroy (manual)
        if: github.event.inputs.action == 'destroy'
        working-directory: ./Terra_example
        run: terraform destroy -auto-approve

      # 🔥 Destroy ONLY if apply fails (and only in apply mode)
      - name: Terraform Destroy (on failure)
        if: failure() && github.event.inputs.action == 'apply'
        working-directory: ./Terra_example
        run: terraform destroy -auto-approve
